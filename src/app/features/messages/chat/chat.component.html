<div class="chat-shell">
  <div class="messages" #messagesContainer>
    <div *ngFor="let m of messages" [class.me]="((m.senderId && (m.senderId._id || m.senderId)) === currentUserId)" class="message-row">
      <img [src]="m.senderId?.image || 'assets/images/avatar.jpg'" alt="avatar" class="convo-avatar" />
      <div class="message-bubble">
        <div class="message-text">{{ m.text }}</div>
        <div class="message-meta">{{ m.createdAt | date:'short' }}</div>
      </div>
    </div>
  </div>

  <div class="chat-input">
    <input matInput placeholder="Type a message" [(ngModel)]="inputText" (keyup.enter)="send()" />
    <button mat-icon-button type="button" color="primary" (click)="send()">
      <mat-icon>send</mat-icon>
    </button>
  </div>
</div>
