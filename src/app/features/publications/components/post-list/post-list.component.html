<div class="pc-feed">

  <!-- ══ FILTRES ══ -->
  <div class="pc-filters" style="display:flex;gap:12px;align-items:center;margin-bottom:12px;">
    <mat-form-field appearance="fill" style="min-width:160px;">
      <mat-label>Catégorie</mat-label>
      <mat-select [(ngModel)]="filterCategory">
        <mat-option [value]="null">Toutes</mat-option>
        <mat-option *ngFor="let c of categories" [value]="c">{{ c }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Début</mat-label>
      <input matInput [matDatepicker]="startPicker" [(ngModel)]="filterStartDate" />
      <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
      <mat-datepicker #startPicker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Fin</mat-label>
      <input matInput [matDatepicker]="endPicker" [(ngModel)]="filterEndDate" />
      <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
      <mat-datepicker #endPicker></mat-datepicker>
    </mat-form-field>

    <div class="filter-actions">
      <button mat-flat-button color="primary" (click)="applyFilters()">
        <mat-icon>filter_list</mat-icon>
        Appliquer
      </button>
    
      <button mat-button class="reset-btn" (click)="clearFilters()">
        <mat-icon>restart_alt</mat-icon>
        Réinitialiser
      </button>
    </div>
  </div>

  <!-- ══ BARRE NOUVELLE PUBLICATION ══ -->
  <div *ngIf="user" class="pc-new-post-bar" (click)="openNewPost()">
    <img [src]="user.image || 'assets/images/avatar.jpg'" alt="avatar" class="pc-new-post-avatar" />
    <div class="pc-new-post-placeholder">
      <span>Quoi de neuf, {{ user.fname }} ? Partagez quelque chose...</span>
    </div>
    <button mat-raised-button color="primary" class="pc-new-post-btn">
      <mat-icon>add_circle_outline</mat-icon> Publier
    </button>
  </div>

  <!-- ══ LISTE DES PUBLICATIONS ══ -->
  <app-post
    *ngFor="let post of posts"
    [post]="post"
    [currentUser]="user"
    [expandedComments]="isCommentsExpanded(post._id)"
    [showShare]="true"
    (like)="addLike($event)"
    (toggleComments)="toggleComments($event)"
    (deletePost)="deletePost($event)"
    (reportPost)="openReport($event)"
    (sharePost)="sharePostHandler($event)"
  ></app-post>

  <!-- État vide -->
  <div *ngIf="posts.length === 0" class="pc-empty-feed">
    <div class="pc-empty-icon">🐾</div>
    <h3>Aucune publication pour le moment</h3>
    <p>Soyez le premier à partager quelque chose !</p>
    <button *ngIf="user" mat-raised-button color="primary" (click)="openNewPost()">
      <mat-icon>add</mat-icon> Créer une publication
    </button>
  </div>
</div>
