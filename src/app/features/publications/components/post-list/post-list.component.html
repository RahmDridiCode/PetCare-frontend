<div class="pc-feed">

  <!-- ══ BARRE NOUVELLE PUBLICATION ══ -->
  <div *ngIf="user" class="pc-new-post-bar" (click)="openNewPost()">
    <img [src]="user.image || 'assets/images/avatar.jpg'" alt="avatar" class="pc-new-post-avatar" />
    <div class="pc-new-post-placeholder">
      <span>Quoi de neuf, {{ user.fname }} ? Partagez quelque chose...</span>
    </div>
    <button mat-raised-button color="primary" class="pc-new-post-btn">
      <mat-icon>add_circle_outline</mat-icon> Publier
    </button>
  </div>

  <!-- ══ LISTE DES PUBLICATIONS ══ -->
  <app-post
    *ngFor="let post of posts"
    [post]="post"
    [currentUser]="user"
    [expandedComments]="isCommentsExpanded(post._id)"
    [showShare]="true"
    (like)="addLike($event)"
    (toggleComments)="toggleComments($event)"
    (deletePost)="deletePost($event)"
    (reportPost)="openReport($event)"
    (sharePost)="sharePostHandler($event)"
  ></app-post>

  <!-- État vide -->
  <div *ngIf="posts.length === 0" class="pc-empty-feed">
    <div class="pc-empty-icon">🐾</div>
    <h3>Aucune publication pour le moment</h3>
    <p>Soyez le premier à partager quelque chose !</p>
    <button *ngIf="user" mat-raised-button color="primary" (click)="openNewPost()">
      <mat-icon>add</mat-icon> Créer une publication
    </button>
  </div>
</div>
